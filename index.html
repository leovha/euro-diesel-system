<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL | MASTER INTELLIGENCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --GOLD: #d4af37; --BG: #050505; --CARD: #111111; --TEXT: #e0e0e0; --GREEN: #2ecc71; --RED: #e74c3c; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--BG); color: var(--TEXT); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #LOGIN-OVERLAY { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .LOGIN-CARD { background: var(--CARD); padding: 40px; border-radius: 20px; border: 1px solid var(--GOLD); width: 350px; text-align: center; }
        nav { width: 280px; background: #080808; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--GOLD); text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--GOLD); padding-bottom: 10px; }
        .nav-item { padding: 15px; margin-bottom: 8px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.3s; }
        .nav-item.active { background: var(--GOLD); color: #000; font-weight: bold; }
        main { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--CARD); padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        button { background: var(--GOLD); border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: #000; }
    </style>
</head>
<body>

<div id="LOGIN-OVERLAY">
    <div class="LOGIN-CARD">
        <h1 style="color: var(--GOLD)">EURO DIESEL</h1>
        <input type="text" id="USER_IN" placeholder="USUÁRIO">
        <input type="password" id="PASS_IN" placeholder="SENHA">
        <button onclick="AUTENTICAR()">ENTRAR</button>
    </div>
</div>

<nav>
    <div class="logo">EURO DIESEL</div>
    <div class="nav-item active" onclick="TELA('dash', this)"><i class="fas fa-chart-line"></i> DASHBOARD</div>
    <div class="nav-item" onclick="TELA('finan', this)"><i class="fas fa-cash-register"></i> CAIXA</div>
    <div class="nav-item" onclick="TELA('vales', this)"><i class="fas fa-hand-holding-usd"></i> VALES</div>
    <div class="nav-item" onclick="TELA('acesso', this)"><i class="fas fa-user-shield"></i> GESTÃO MASTER</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top: auto; color: var(--RED);"><i class="fas fa-sign-out-alt"></i> SAIR</div>
</nav>

<main id="SISTEMA">
    <div id="dash" class="view active"><h1>DASHBOARD MASTER</h1></div>
    
    <div id="finan" class="view"><h1>CAIXA / ENTRADAS</h1></div>

    <div id="vales" class="view"><h1>LANÇAR VALES</h1></div>

    <div id="acesso" class="view">
        <h1>GESTÃO DE ACESSOS</h1>
        <div class="card">
            <input type="text" id="N_USER" placeholder="NOME DO USUÁRIO">
            <input type="text" id="N_PASS" placeholder="SENHA DE ACESSO">
            <select id="N_NIVEL">
                <option value="MASTER">MASTER</option>
                <option value="ADM">ADMINISTRATIVO (ZANE)</option>
                <option value="TEC">TÉCNICO</option>
            </select>
            <button onclick="CRIAR_ACESSO()">GERAR ACESSO</button>
        </div>
    </div>
</main>

<script>
    const S_URL = 'https://nqpdhwdkpqjcmvxgaypm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xcGRod2RrcHFqY212eGdheXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzc4MTQsImV4cCI6MjA5MDcxMzgxNH0.oV-G2iGKOEzPUw0jGK9BL14_kx30UqjJ0wXu8xloZdw';
    const _SUPA = supabase.createClient(S_URL, S_KEY);

    function AUTENTICAR() {
        const u = document.getElementById('USER_IN').value.toUpperCase();
        const p = document.getElementById('PASS_IN').value;
        if(u === 'LEANDRO' && p === 'MASTER777') {
            document.getElementById('LOGIN-OVERLAY').style.display = 'none';
            document.getElementById('SISTEMA').style.display = 'block';
        } else { alert('NEGADO!'); }
    }

    function TELA(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function CRIAR_ACESSO() {
        const nome = document.getElementById('N_USER').value;
        const senha = document.getElementById('N_PASS').value;
        const nivel = document.getElementById('N_NIVEL').value;

        if (!nome || !senha) return alert("PREENCHA OS CAMPOS!");

        const { error } = await _SUPA.from('USUARIOS').insert([{ nome, senha, nivel }]);

        if (error) {
            alert("ERRO AO SALVAR: " + error.message);
        } else {
            alert("ACESSO CRIADO PARA " + nome);
            document.getElementById('N_USER').value = '';
            document.getElementById('N_PASS').value = '';
        }
    }
</script>
</body>
</html>
