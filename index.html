<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL | MASTER INTELLIGENCE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --GOLD: #C5A021; --BG: #050505; --CARD: #111111; --TEXT: #E0E0E0; --RED: #FF4D4D; --GREEN: #00FF88; }
        * { text-transform: UPPERCASE; box-sizing: border-box; font-family: 'SANS-SERIF'; }
        body { background: var(--BG); color: var(--TEXT); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #LOGIN-SCREEN { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 99999; }
        .CARD-LOGIN { background: var(--CARD); border: 1px solid var(--GOLD); padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        
        nav { width: 280px; background: #080808; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 25px; }
        .NAV-ITEM { padding: 16px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #777; transition: 0.3s; }
        .NAV-ITEM.ACTIVE { background: var(--GOLD); color: #000; font-weight: 900; }
        
        main { flex: 1; padding: 40px; overflow-y: auto; display: block; }
        .VIEW { display: none; }
        .VIEW.ACTIVE { display: block; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #FFF; border-radius: 8px; }
        button { background: var(--GOLD); border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .GRID { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .CARD-DASH { background: var(--CARD); border: 1px solid #222; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="LOGIN-SCREEN">
    <div class="CARD-LOGIN">
        <h1 style="color: var(--GOLD); margin-bottom: 20px;">EURO DIESEL</h1>
        <input type="text" id="USER_IN" placeholder="USUÁRIO">
        <input type="password" id="PASS_IN" placeholder="SENHA">
        <button onclick="AUTENTICAR()">ACESSAR SISTEMA</button>
    </div>
</div>

<nav id="SIDEBAR" style="display: none;">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: var(--GOLD); margin: 0;">EURO DIESEL</h2>
        <small id="USER_LOGADO" style="color: #555;"></small>
    </div>
    <div class="NAV-ITEM ACTIVE" onclick="TELA('DASH', this)"><i class="fas fa-chart-line"></i> DASHBOARD</div>
    <div class="NAV-ITEM" onclick="TELA('OS', this)"><i class="fas fa-file-invoice"></i> ORDENS DE SERVIÇO</div>
    <div class="NAV-ITEM" onclick="TELA('EQUIPE', this)"><i class="fas fa-users"></i> EQUIPE / VALES</div>
    <div class="NAV-ITEM" onclick="TELA('CONFIG', this)"><i class="fas fa-user-shield"></i> GESTÃO ACESSO</div>
    <div class="NAV-ITEM" onclick="location.reload()" style="margin-top: auto; color: var(--RED);"><i class="fas fa-sign-out-alt"></i> SAIR</div>
</nav>

<main id="MAIN-CONTENT" style="display: none;">
    <div id="DASH" class="VIEW ACTIVE">
        <h1>PAINEL EXECUTIVO</h1>
        <div class="GRID">
            <div class="CARD-DASH"><h3>FATURAMENTO</h3><div id="FAT_MES" style="color: var(--GREEN); font-size: 24px; font-weight: 900;">R$ 0,00</div></div>
            <div class="CARD-DASH"><h3>COMISSÕES</h3><div style="color: var(--RED); font-size: 24px; font-weight: 900;">R$ 0,00</div></div>
        </div>
    </div>

    <div id="OS" class="VIEW">
        <h1>LANÇAR NOVA OS</h1>
        <div class="CARD-DASH">
            <input type="text" id="OS_NUM" placeholder="Nº OS">
            <input type="text" id="OS_CLI" placeholder="CLIENTE">
            <input type="number" id="OS_MO" placeholder="VALOR MÃO DE OBRA">
            <button onclick="alert('FUNCIONALIDADE EM ATIVAÇÃO...')">SALVAR OS</button>
        </div>
    </div>

    <div id="EQUIPE" class="VIEW"><h1>GESTÃO DE EQUIPE</h1><p>EM DESENVOLVIMENTO...</p></div>
    <div id="CONFIG" class="VIEW"><h1>GESTÃO DE ACESSOS</h1><p>EM DESENVOLVIMENTO...</p></div>
</main>

<script>
    // CREDENCIAIS
    const S_URL = 'https://nqpdhwdkpqjcmvxgaypm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xcGRod2RrcHFqY212eGdheXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzc4MTQsImV4cCI6MjA5MDcxMzgxNH0.oV-G2iGKOEzPUw0jGK9BL14_kx30UqjJ0wXu8xloZdw';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function AUTENTICAR() {
        const u = document.getElementById('USER_IN').value.toUpperCase().trim();
        const p = document.getElementById('PASS_IN').value.trim();

        // ATALHO MASTER OBRIGATÓRIO
        if (u === 'LEANDRO' && p === 'MASTER777') {
            LIBERAR_SISTEMA('MASTER LEANDRO');
            return;
        }

        // BUSCA NO BANCO
        const { data, error } = await _supabase.from('USUARIOS').select('*').eq('USUARIO', u).eq('SENHA', p).maybeSingle();

        if (data) {
            LIBERAR_SISTEMA(data.USUARIO);
        } else {
            alert('ACESSO NEGADO! TENTE: LEANDRO / MASTER777');
        }
    }

    function LIBERAR_SISTEMA(nome) {
        document.getElementById('LOGIN-SCREEN').style.display = 'none';
        document.getElementById('SIDEBAR').style.display = 'flex';
        document.getElementById('MAIN-CONTENT').style.display = 'block';
        document.getElementById('USER_LOGADO').innerText = nome;
    }

    function TELA(id, el) {
        document.querySelectorAll('.VIEW').forEach(v => v.classList.remove('ACTIVE'));
        document.querySelectorAll('.NAV-ITEM').forEach(n => n.classList.remove('ACTIVE'));
        document.getElementById(id).classList.add('ACTIVE');
        el.classList.add('ACTIVE');
    }
</script>

</body>
</html>
