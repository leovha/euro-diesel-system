<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | MASTER INTELLIGENCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --GOLD: #C5A021; --BG: #050505; --CARD: #111111; --TEXT: #E0E0E0; }
        * { text-transform: uppercase; box-sizing: border-box; font-family: 'INTER', SANS-SERIF; }
        body { background: var(--BG); color: var(--TEXT); margin: 0; display: flex; height: 100VH; overflow: hidden; }
        
        /* LOGIN */
        #LOGIN-SCREEN { position: FIXED; INSET: 0; background: #000; display: FLEX; align-items: CENTER; justify-content: CENTER; z-index: 10000; }
        .LOGIN-BOX { background: var(--CARD); padding: 40PX; border-radius: 20PX; border: 1PX SOLID var(--GOLD); text-align: CENTER; width: 320PX; }
        input { width: 100%; padding: 12PX; margin: 10PX 0; background: #000; border: 1PX SOLID #333; color: #FFF; border-radius: 8PX; }
        
        /* SIDEBAR */
        nav { width: 280PX; background: #080808; border-right: 1PX SOLID #222; display: NONE; flex-direction: COLUMN; padding: 25PX; }
        .NAV-ITEM { padding: 16PX; margin: 5PX 0; border-radius: 12PX; cursor: POINTER; display: FLEX; align-items: CENTER; gap: 15PX; color: #777; transition: 0.3S; }
        .NAV-ITEM.ACTIVE { background: var(--GOLD); color: #000; font-weight: 900; }

        /* MAIN */
        main { flex: 1; padding: 40PX; overflow-y: AUTO; display: NONE; }
        .VIEW { display: NONE; }
        .VIEW.ACTIVE { display: BLOCK; }
        .CARD { background: var(--CARD); border: 1PX SOLID #222; padding: 25PX; border-radius: 20PX; margin-bottom: 20PX; }
        button { background: var(--GOLD); border: NONE; padding: 12PX 20PX; border-radius: 8PX; font-weight: BOLD; cursor: POINTER; }
    </style>
</head>
<body>

<div id="LOGIN-SCREEN">
    <div class="LOGIN-BOX">
        <h1 style="color: var(--GOLD)">EURO DIESEL</h1>
        <input type="text" id="USER" placeholder="USUÁRIO">
        <input type="password" id="PASS" placeholder="SENHA">
        <button onclick="EFETUAR_LOGIN()" style="width: 100%">ENTRAR NO SISTEMA</button>
    </div>
</div>

<nav id="SIDEBAR">
    <h2 style="color: var(--GOLD); text-align: CENTER;">EURO DIESEL</h2>
    <div class="NAV-ITEM ACTIVE" onclick="MUDAR_TELA('DASH')"><i class="fas fa-chart-line"></i> PAINEL MASTER</div>
    <div class="NAV-ITEM" onclick="MUDAR_TELA('OS')"><i class="fas fa-file-invoice"></i> ORDENS DE SERVIÇO</div>
    <div class="NAV-ITEM" onclick="location.reload()" style="margin-top: AUTO;"><i class="fas fa-sign-out-alt"></i> SAIR</div>
</nav>

<main id="CONTEUDO">
    <div id="DASH" class="VIEW ACTIVE">
        <h1>BEM-VINDO, MASTER LEANDRO</h1>
        <div class="CARD">
            <h3>RESUMO FINANCEIRO (SINCRO NUVEM)</h3>
            <p id="INFO-DASH">CARREGANDO DADOS DO SUPABASE...</p>
        </div>
    </div>

    <div id="OS" class="VIEW">
        <h1>ORDENS DE SERVIÇO</h1>
        <div class="CARD">
            <input type="text" id="OS_NUM" placeholder="Nº DA OS">
            <input type="text" id="OS_CLIENTE" placeholder="CLIENTE">
            <input type="number" id="OS_VALOR" placeholder="VALOR TOTAL (R$)">
            <button onclick="SALVAR_OS_BANCO()">REGISTRAR OS NO SUPABASE</button>
        </div>
    </div>
</main>

<script>
    // CONEXÃO REAL COM SEU SUPABASE
    const SUPABASE_URL = 'https://nqpdhwdkpqjcmvxgaypm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xcGRod2RrcHFqY212eGdheXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzc4MTQsImV4cCI6MjA5MDcxMzgxNH0.oV-G2iGKOEzPUw0jGK9BL14_kx30UqjJ0wXu8xloZdw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function EFETUAR_LOGIN() {
        const U = document.getElementById('USER').value.toUpperCase();
        const P = document.getElementById('PASS').value;

        // BUSCA NA TABELA USUARIOS QUE VOCÊ CRIOU
        const { data, error } = await _supabase
            .from('USUARIOS')
            .select('*')
            .eq('USUARIO', U)
            .eq('SENHA', P)
            .single();

        if (data) {
            document.getElementById('LOGIN-SCREEN').style.display = 'NONE';
            document.getElementById('SIDEBAR').style.display = 'FLEX';
            document.getElementById('CONTEUDO').style.display = 'BLOCK';
        } else {
            alert('ACESSO NEGADO! VERIFIQUE SEU USUÁRIO NA TABELA DO SUPABASE.');
        }
    }

    async function SALVAR_OS_BANCO() {
        const NUM = document.getElementById('OS_NUM').value.toUpperCase();
        const CLI = document.getElementById('OS_CLIENTE').value.toUpperCase();
        const VAL = document.getElementById('OS_VALOR').value;

        const { error } = await _supabase
            .from('ORDENS_SERVICO')
            .insert([{ NUMERO_OS: NUM, CLIENTE: CLI, VALOR_MO: VAL, STATUS: 'FINALIZADA' }]);

        if (error) alert('ERRO AO SALVAR: ' + error.message);
        else alert('OS ' + NUM + ' SALVA COM SUCESSO NA NUVEM!');
    }

    function MUDAR_TELA(ID) {
        document.querySelectorAll('.VIEW').forEach(v => v.classList.remove('ACTIVE'));
        document.getElementById(ID).classList.add('ACTIVE');
    }
</script>
</body>
</html>
