<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | MASTER SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script> 
    <script src="../js/config.js"></script>
    
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --card: #161616; --red: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar h2 { color: var(--gold); text-align: center; font-size: 22px; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid transparent; color: #888; padding: 15px; text-align: left; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-bottom: 5px; border-radius: 4px; }
        .nav-btn:hover { color: var(--gold); background: #222; }
        .nav-btn.active { background: var(--gold); color: black; border-left: 5px solid white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%); }
        .bloco { display: none; }
        .bloco.ativo { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid-financeiro { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-master { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 30px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--gold); }
        .card-master h3 { font-size: 14px; color: #aaa; margin: 0; text-transform: uppercase; }
        .card-master .valor { font-size: 32px; color: var(--gold); font-weight: bold; margin-top: 15px; }
        .btn-logout { background: var(--red); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>EURO DIESEL</h2>
        <button class="nav-btn active" onclick="trocarBloco('dash', this)">Painel de Varredura</button>
        <button class="nav-btn" onclick="trocarBloco('boletos', this)">Lançar Boletos</button>
        <button class="nav-btn" onclick="trocarBloco('vales', this)">Vales & Comissões</button>
        <button class="nav-btn" onclick="trocarBloco('usuarios', this)">Gestão de Usuários</button>
        <button class="nav-btn" onclick="trocarBloco('ia', this)">Relatórios IA</button>
        <button class="btn-logout" onclick="sair()">SAIR DO SISTEMA</button>
    </nav>

    <main class="main-content">
        <div id="dash" class="bloco ativo">
            <h1 style="border-left: 5px solid var(--gold); padding-left: 15px;">VARREDURA FINANCEIRA</h1>
            <div class="grid-financeiro">
                <div class="card-master"><h3>Hoje</h3><div id="v-hoje" class="valor">R$ 0,00</div></div>
                <div class="card-master"><h3>Este Mês</h3><div id="v-mes" class="valor">R$ 0,00</div></div>
                <div class="card-master"><h3>Próx. 12 Meses</h3><div id="v-ano" class="valor">R$ 0,00</div></div>
            </div>
        </div>

        <div id="boletos" class="bloco">
            <h1 style="color: var(--gold);">LANÇAMENTO INTELIGENTE</h1>
            <h2 style="color: var(--gold); margin-top: 40px;">BOLETOS AGUARDANDO PAGAMENTO</h2>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 10px;">
                <table style="width: 100%; color: white; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--gold); text-align: left;">
                            <th style="padding: 10px;">CLIENTE</th>
                            <th>VALOR</th>
                            <th>VENCIMENTO</th>
                            <th>AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-boletos"></tbody>
                </table>
            </div>
            <div style="border: 2px dashed var(--gold); padding: 20px; text-align: center; margin: 20px 0; border-radius: 10px; background: rgba(212, 175, 55, 0.05);">
                <p style="color: #aaa;">Arraste o PDF do Boleto aqui ou</p>
                <input type="file" id="pdf_input" accept=".pdf" style="display: none;">
                <button onclick="document.getElementById('pdf_input').click()" style="background: var(--gold); color: black; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 5px;">SELECIONAR PDF</button>
            </div>
            <div id="form-lançamento" style="background: #1a1a1a; padding: 20px; border-radius: 10px;">
                <label>CLIENTE:</label>
                <input type="text" id="f_cliente" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333;">
                <label>VALOR:</label>
                <input type="text" id="f_valor" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333;">
                <label>VENCIMENTO:</label>
                <input type="date" id="f_vencimento" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333;">
                <button onclick="registrarBoleto()" style="width: 100%; background: #28a745; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px;">CONFIRMAR E SALVAR NO BANCO</button>
            </div>
        </div>

        <div id="vales" class="bloco">
            <h1 style="color: var(--gold); border-left: 5px solid var(--gold); padding-left: 15px;">VALES E COMISSÕES</h1>
            <div id="form-vale" style="background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <label>FUNCIONÁRIO:</label>
                <input type="text" id="v_funcionario" placeholder="Ex: JOÃO" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333;">
                <label>VALOR DO VALE:</label>
                <input type="number" id="v_valor_vale" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333;">
                <button onclick="registrarVale()" style="width: 100%; background: var(--gold); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px;">LANÇAR VALE</button>
            </div>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 10px;">
                <table style="width: 100%; color: white; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--gold); text-align: left;">
                            <th style="padding: 10px;">DATA</th>
                            <th>FUNCIONÁRIO</th>
                            <th>VALOR</th>
                            <th>AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-vales"></tbody>
                </table>
            </div>
        </div>
        
        <div id="usuarios" class="bloco"><h1>USUÁRIOS</h1></div>
    </main>

    <script>
    function trocarBloco(id, botao) {
        document.querySelectorAll('.bloco').forEach(b => b.classList.remove('ativo'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativo');
        botao.classList.add('active');
    }

    function sair() {
        localStorage.clear();
        window.location.href = '../index.html';
    }

    async function carregarFinanceiro() {
        const { data: boletos, error } = await supabaseCon.from('FINANCEIRO').select('*').order('vencimento', { ascending: true });
        if (error) return console.error(error.message);

        const tabela = document.getElementById('tabela-boletos');
        tabela.innerHTML = ""; 

        let tHoje = 0, tAno = 0;
        const hojeIso = new Date().toISOString().split('T')[0];

        boletos.forEach(b => {
            const v = parseFloat(b.valor) || 0;
            if (b.vencimento === hojeIso) tHoje += v;
            tAno += v;

            tabela.innerHTML += `
                <tr style="border-bottom: 1px solid #333;">
                    <td style="padding: 10px;">${b.cliente}</td>
                    <td style="color: var(--gold);">R$ ${v.toFixed(2)}</td>
                    <td>${b.vencimento.split('-').reverse().join('/')}</td>
                    <td>
                        <button onclick="removerBoleto('${b.id}')" style="background: var(--red); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;">EXCLUIR</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('v-hoje').innerText = tHoje.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
        document.getElementById('v-ano').innerText = tAno.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
    }

    async function removerBoleto(id) {
        if (confirm("Deseja realmente remover este boleto?")) {
            const { error } = await supabaseCon.from('FINANCEIRO').delete().eq('id', id);
            if (error) alert("Erro ao excluir: " + error.message);
            else {
                alert("Boleto removido!");
                carregarFinanceiro();
            }
        }
    }

    const pdfInput = document.getElementById('pdf_input');
    pdfInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let texto = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                texto += content.items.map(item => item.str).join(" ");
            }

            // 1. VALOR (BUSCA PADRÃO FINANCEIRO 0,00)
            const regexValor = /(?:\d{1,3}(?:\.\d{3})*,\d{2})/;
            const vAchado = texto.match(regexValor);
            if (vAchado) document.getElementById('f_valor').value = vAchado[0].replace('.', '').replace(',', '.');

            // 2. VENCIMENTO (PEGA A ÚLTIMA DATA DO DOCUMENTO)
            const regexData = /(\d{2}\/\d{2}\/\d{4})/g;
            const todasDatas = texto.match(regexData);
            if (todasDatas && todasDatas.length > 0) {
                const dataVenc = todasDatas[todasDatas.length - 1];
                const p = dataVenc.split('/');
                document.getElementById('f_vencimento').value = `${p[2]}-${p[1]}-${p[0]}`;
            }

            // 3. CLIENTE (FOCO NA LINHA "Nome do Pagador...")
            let nomeFinal = "VERIFICAR";
            
            // Se encontrar a frase padrão do boleto
            const termoChave = "Nome do Pagador/CPF/CNPJ/Endereço/Cidade/UF/CEP";
            if (texto.includes(termoChave)) {
                let r = texto.split(termoChave)[1] || "";
                // Remove lixo comum e pega apenas o início (nome da empresa)
                nomeFinal = r.replace(/CPF|CNPJ|ENDERECO|CIDADE|UF|CEP|NOME|DO|PAGADOR|RUA|AVENIDA|AV|[-./0-9]/gi, " ")
                             .trim()
                             .split("  ")[0] // Tenta pegar até o primeiro espaço duplo (comum entre nome e CNPJ)
                             .split("/")[0]  // Corta se tiver barra separando CNPJ
                             .trim();
            } else if (texto.includes("Pagador")) {
                let r = texto.split("Pagador")[1] || "";
                nomeFinal = r.replace(/CPF|CNPJ|ENDERECO|CIDADE|UF|CEP|NOME|DO|PAGADOR|RUA|AVENIDA|AV|[-./0-9]/gi, " ")
                             .trim()
                             .split("  ")[0]
                             .trim();
            }
            
            document.getElementById('f_cliente').value = nomeFinal.toUpperCase();
            alert("IA Euro Diesel: Boleto processado!");
        };
        reader.readAsArrayBuffer(file);
    });

    async function registrarBoleto() {
        const c = document.getElementById('f_cliente').value;
        const v = document.getElementById('f_valor').value;
        const d = document.getElementById('f_vencimento').value;

        if(!c || !v || !d) return alert("Erro: Preencha todos os campos!");

        try {
            const { error } = await supabaseCon.from('FINANCEIRO').insert([{ 
                cliente: c.toUpperCase(), 
                valor: parseFloat(v), 
                vencimento: d, 
                status: 'PENDENTE' 
            }]);

            if (error) throw error;

            alert("Salvo com sucesso no banco de dados!");

            // --- INÍCIO DA LIMPEZA (SEM BAGUNÇAR O RESTO) ---
            document.getElementById('f_cliente').value = "";
            document.getElementById('f_valor').value = "";
            document.getElementById('f_vencimento').value = "";
            document.getElementById('pdf_input').value = ""; // Limpa o seletor de arquivo para o próximo PDF
            // --- FIM DA LIMPEZA ---

            carregarFinanceiro();
            
        } catch (err) {
            console.error(err);
            alert("Erro ao salvar no banco. Verifique a conexão.");
        }
    }

    async function registrarVale() {
        const f = document.getElementById('v_funcionario').value.toUpperCase();
        const v = document.getElementById('v_valor_vale').value;
        const dataAtual = new Date().toISOString().split('T')[0];

        const { error } = await supabaseCon.from('VALES').insert([{ funcionario: f, valor: parseFloat(v), data: dataAtual }]);
        if (error) alert("Erro: " + error.message);
        else {
            alert("Vale registrado!");
            document.getElementById('v_funcionario').value = "";
            document.getElementById('v_valor_vale').value = "";
            carregarVales();
        }
    }

    async function carregarVales() {
        const { data: vales, error } = await supabaseCon.from('VALES').select('*').order('data', { ascending: false });
        if (error) return;

        const tabela = document.getElementById('tabela-vales');
        tabela.innerHTML = "";
        vales.forEach(v => {
            tabela.innerHTML += `
                <tr style="border-bottom: 1px solid #333;">
                    <td style="padding: 10px;">${v.data.split('-').reverse().join('/')}</td>
                    <td>${v.funcionario}</td>
                    <td style="color: #ff4444;">- R$ ${parseFloat(v.valor).toFixed(2)}</td>
                    <td><button onclick="removerVale('${v.id}')" style="background:none; border:none; color:red; cursor:pointer;">[X]</button></td>
                </tr>`;
        });
    }

    async function removerVale(id) {
        if (confirm("Excluir este vale?")) {
            await supabaseCon.from('VALES').delete().eq('id', id);
            carregarVales();
        }
    }

    carregarFinanceiro();
    carregarVales();
</script>
</body>
</html>
