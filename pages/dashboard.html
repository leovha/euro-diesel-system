<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL - Sistema Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Menu Lateral */
        .sidebar { width: 250px; background: var(--card); border-right: 2px solid var(--gold); display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: var(--gold); text-align: center; font-size: 18px; margin-bottom: 30px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid transparent; color: white; padding: 15px; text-align: left; cursor: pointer; font-size: 16px; transition: 0.3s; margin-bottom: 5px; border-radius: 5px; }
        .nav-btn:hover { border-color: var(--gold); color: var(--gold); background: #222; }
        .nav-btn.active { background: var(--gold); color: black; font-weight: bold; }

        /* Área de Conteúdo */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .grid-financeiro { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 8px; text-align: center; }
        .card .valor { font-size: 24px; color: var(--gold); font-weight: bold; margin-top: 10px; }

        .secao { display: none; } /* Esconde as áreas que não estão ativas */
        .secao.ativa { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>EURO DIESEL</h2>
        <button class="nav-btn active" onclick="mudarTela('dash', this)">DASHBOARD</button>
        <button class="nav-btn" onclick="mudarTela('boletos', this)">LANÇAR BOLETOS</button>
        <button class="nav-btn" onclick="mudarTela('lista', this)">VER RECEBÍVEIS</button>
        <button class="nav-btn" style="margin-top: auto; border-color: #ff4444; color: #ff4444;" onclick="sair()">SAIR</button>
    </div>

    <div class="main-content">
        
        <div id="dash" class="secao ativa">
            <h1>VARREDURA DE RECEBÍVEIS</h1>
            <div class="grid-financeiro">
                <div class="card"><h3>HOJE</h3><div id="hoje" class="valor">R$ 0,00</div></div>
                <div class="card"><h3>ESTE MÊS</h3><div id="mes" class="valor">R$ 0,00</div></div>
                <div class="card"><h3>PROX. 12 MESES</h3><div id="ano" class="valor">R$ 0,00</div></div>
            </div>
        </div>

        <div id="boletos" class="secao">
            <h1>NOVO LANÇAMENTO</h1>
            <p>Área de cadastro de boletos em desenvolvimento...</p>
        </div>

        <div id="lista" class="secao">
            <h1>LISTA COMPLETA</h1>
            <p>Aqui aparecerá a varredura detalhada dos 12 meses.</p>
        </div>

    </div>

    <script>
        // Função para Navegar entre as áreas
        function mudarTela(idTela, btn) {
            // Esconde todas as seções
            document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
            // Remove destaque dos botões
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Mostra a tela escolhida e destaca o botão
            document.getElementById(idTela).classList.add('ativa');
            btn.classList.add('active');
        }

        function sair() {
            localStorage.clear();
            window.location.href = '../index.html';
        }

        // Rodar varredura ao carregar (mesma lógica anterior)
        async function carregarVarredura() {
            const { data: boletos } = await supabaseCon.from('FINANCEIRO').select('*').eq('status', 'PENDENTE');
            if (boletos) {
                // ... lógica de soma aqui ...
            }
        }
    </script>
</body>
</html>
