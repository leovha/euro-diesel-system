<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Menu Lateral */
        .sidebar { width: 250px; background: var(--card); border-right: 2px solid var(--gold); display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: var(--gold); text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid transparent; color: white; padding: 15px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 5px; }
        .nav-btn:hover { border-color: var(--gold); background: #222; }
        .nav-btn.active { background: var(--gold); color: black; font-weight: bold; }

        /* Área Central */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .grid-financeiro { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 25px; border-radius: 10px; text-align: center; }
        .card .valor { font-size: 28px; color: var(--gold); font-weight: bold; margin-top: 10px; }
        
        .btn-sair { background: #ff4444; color: white; border: none; padding: 10px; cursor: pointer; margin-top: auto; border-radius: 5px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>EURO DIESEL</h2>
        <button class="nav-btn active">DASHBOARD</button>
        <button class="nav-btn">LANÇAR BOLETOS</button>
        <button class="nav-btn">VER RECEBÍVEIS</button>
        <button class="btn-sair" onclick="localStorage.clear(); window.location.href='../index.html';">SAIR</button>
    </nav>

    <main class="main-content">
        <h1>VARREDURA DE RECEBÍVEIS</h1>
        <div class="grid-financeiro">
            <div class="card"><h3>HOJE</h3><div id="v-hoje" class="valor">R$ 0,00</div></div>
            <div class="card"><h3>ESTE MÊS</h3><div id="v-mes" class="valor">R$ 0,00</div></div>
            <div class="card"><h3>PRÓX. 12 MESES</h3><div id="v-ano" class="valor">R$ 0,00</div></div>
        </div>
    </main>

    <script>
        // Lógica para puxar os dados do Supabase
        async function carregarDados() {
            const { data: boletos } = await supabaseCon
                .from('FINANCEIRO')
                .select('*')
                .eq('status', 'PENDENTE');

            if (boletos) {
                let hoje = 0, mes = 0, ano = 0;
                const dataAtual = new Date().toISOString().split('T')[0];

                boletos.forEach(b => {
                    const val = parseFloat(b.valor);
                    if (b.vencimento === dataAtual) hoje += val;
                    ano += val; // Soma tudo para os 12 meses
                });

                document.getElementById('v-hoje').innerText = hoje.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
                document.getElementById('v-ano').innerText = ano.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
            }
        }
        carregarDados();
    </script>
</body>
</html>
