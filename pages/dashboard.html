<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | MASTER SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --card: #161616; --red: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral Estilo Scania */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar h2 { color: var(--gold); text-align: center; font-size: 22px; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid transparent; color: #888; padding: 15px; text-align: left; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-bottom: 5px; border-radius: 4px; }
        .nav-btn:hover { color: var(--gold); background: #222; }
        .nav-btn.active { background: var(--gold); color: black; border-left: 5px solid white; }

        /* Conteúdo Principal */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%); }
        .bloco { display: none; } /* Esconde por padrão */
        .bloco.ativo { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cartões de Varredura */
        .grid-financeiro { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-master { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 30px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--gold); }
        .card-master h3 { font-size: 14px; color: #aaa; margin: 0; text-transform: uppercase; }
        .card-master .valor { font-size: 32px; color: var(--gold); font-weight: bold; margin-top: 15px; }

        .btn-logout { background: var(--red); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>EURO DIESEL</h2>
        <button class="nav-btn active" onclick="trocarBloco('dash', this)">Painel de Varredura</button>
        <button class="nav-btn" onclick="trocarBloco('boletos', this)">Lançar Boletos</button>
        <button class="nav-btn" onclick="trocarBloco('vales', this)">Vales & Comissões</button>
        <button class="nav-btn" onclick="trocarBloco('usuarios', this)">Gestão de Usuários</button>
        <button class="nav-btn" onclick="trocarBloco('ia', this)">Relatórios IA</button>
        
        <button class="btn-logout" onclick="sair()">SAIR DO SISTEMA</button>
    </nav>

    <main class="main-content">
        
        <div id="dash" class="bloco ativo">
            <h1 style="border-left: 5px solid var(--gold); padding-left: 15px;">VARREDURA FINANCEIRA</h1>
            <div class="grid-financeiro">
                <div class="card-master"><h3>Hoje</h3><div id="v-hoje" class="valor">R$ 0,00</div></div>
                <div class="card-master"><h3>Este Mês</h3><div id="v-mes" class="valor">R$ 0,00</div></div>
                <div class="card-master"><h3>Próx. 12 Meses</h3><div id="v-ano" class="valor">R$ 0,00</div></div>
            </div>
        </div>

        <div id="boletos" class="bloco">
    <h1 style="color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px;">NOVO LANÇAMENTO FINANCEIRO</h1>
    
    <div style="max-width: 500px; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; margin-top: 20px;">
        <label style="display:block; margin-bottom: 8px; color: #888;">NOME DO CLIENTE / TRANSPORTADORA</label>
        <input type="text" id="f_cliente" placeholder="Ex: Andreis Transportador" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #0b0b0b; border: 1px solid #444; color: white; border-radius: 5px;">

        <label style="display:block; margin-bottom: 8px; color: #888;">VALOR DO BOLETO (R$)</label>
        <input type="number" id="f_valor" placeholder="0.00" step="0.01" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #0b0b0b; border: 1px solid #444; color: white; border-radius: 5px;">

        <label style="display:block; margin-bottom: 8px; color: #888;">DATA DE VENCIMENTO</label>
        <input type="date" id="f_vencimento" style="width: 100%; padding: 12px; margin-bottom: 25px; background: #0b0b0b; border: 1px solid #444; color: white; border-radius: 5px;">

        <button onclick="registrarBoleto()" style="width: 100%; background: var(--gold); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;">Confirmar Lançamento</button>
    </div>
</div>

        <div id="vales" class="bloco">
            <h1>VALES E COMISSÕES</h1>
            <p>Controle de adiantamentos e porcentagens dos técnicos.</p>
        </div>

        <div id="usuarios" class="bloco">
            <h1>USUÁRIOS DO SISTEMA</h1>
            <p>Gerenciamento de acessos (Zane, Eduardo, etc).</p>
        </div>

    </main>

    <script>
        // Função que controla a visibilidade dos blocos
        function trocarBloco(id, botao) {
            // Esconde todos os blocos
            document.querySelectorAll('.bloco').forEach(b => b.classList.remove('ativo'));
            // Remove destaque dos botões
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            
            // Mostra o bloco clicado e destaca o botão
            document.getElementById(id).classList.add('ativo');
            botao.classList.add('active');
        }

        function sair() {
            localStorage.clear();
            window.location.href = '../index.html';
        }

        // Simulação de Varredura (Conecta com sua tabela FINANCEIRO)
        async function carregarFinanceiro() {
            // Lógica do Supabase vai aqui para preencher v-hoje, v-mes e v-ano
        }
        carregarFinanceiro();
        async function registrarBoleto() {
    const cliente = document.getElementById('f_cliente').value;
    const valor = document.getElementById('f_valor').value;
    const vencimento = document.getElementById('f_vencimento').value;

    if (!cliente || !valor || !vencimento) {
        alert("Por favor, preencha todos os campos!");
        return;
    }

    const { data, error } = await supabaseCon
        .from('FINANCEIRO')
        .insert([
            { 
                cliente: cliente, 
                valor: parseFloat(valor), 
                vencimento: vencimento, 
                status: 'PENDENTE' 
            }
        ]);

    if (error) {
        alert("Erro ao salvar: " + error.message);
    } else {
        alert("Boleto registrado com sucesso na Euro Diesel!");
        // Limpa os campos após salvar
        document.getElementById('f_cliente').value = '';
        document.getElementById('f_valor').value = '';
        document.getElementById('f_vencimento').value = '';
    }
}
    </script>
</body>
</html>
