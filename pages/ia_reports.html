<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | IA REPORTS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --card: #161616; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
        .grid-ia { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card-ia { background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 12px; border-bottom: 3px solid var(--gold); }
        .valor-ia { font-size: 28px; color: var(--gold); font-weight: bold; margin-top: 10px; }
        .btn-voltar { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
        .btn-gerar { background: var(--gold); color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="window.history.back()">← VOLTAR AO SISTEMA</button>

    <h1 style="color: var(--gold); border-left: 5px solid var(--gold); padding-left: 15px;">RELATÓRIOS INTELIGENTES (IA)</h1>

    <div class="grid-ia">
        <div class="card-ia">
            <h3>PREVISÃO DE CAIXA (30 DIAS)</h3>
            <div id="ia-previsao" class="valor-ia">R$ 0,00</div>
        </div>
        <div class="card-ia">
            <h3>ALERTAS DE VENCIMENTO</h3>
            <div id="ia-alertas" class="valor-ia" style="color: #ff4444; font-size: 18px;">Nenhum alerta ativo</div>
        </div>
    </div>

    <div style="margin-top: 30px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333;">
        <h3 style="color: var(--gold); margin-top: 0;">ANÁLISE DE DESEMPENHO</h3>
        <p id="ia-texto-analise" style="color: #ccc; line-height: 1.6;">
            Aguardando processamento dos dados do banco para gerar insights...
        </p>
        <button class="btn-gerar" onclick="gerarRelatorioIA()">PROCESSAR DADOS COM IA</button>
    </div>

    <script>
        // A lógica do Passo 2 entrará aqui
        async function gerarRelatorioIA() {
            alert("Iniciando varredura no banco de dados...");
        }
        async function gerarRelatorioIA() {
        const btn = document.querySelector('.btn-gerar');
        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        try {
            // 1. BUSCAR BOLETOS PENDENTES NO SUPABASE
            const { data: boletos, error: errB } = await supabaseCon
                .from('FINANCEIRO')
                .select('valor, vencimento')
                .eq('status', 'PENDENTE');

            if (errB) throw errB;

            // 2. CALCULAR PREVISÃO E ALERTAS
            let totalReceber = 0;
            let atrasados = 0;
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0); // Ajusta para comparar apenas a data

            boletos.forEach(b => {
                const valor = parseFloat(b.valor) || 0;
                totalReceber += valor;

                // Converte a string de vencimento (AAAA-MM-DD) para objeto Date
                const [ano, mes, dia] = b.vencimento.split('-');
                const dataVenc = new Date(ano, mes - 1, dia);

                if (dataVenc < hoje) {
                    atrasados++;
                }
            });

            // 3. ATUALIZAR A TELA COM OS DADOS REAIS
            document.getElementById('ia-previsao').innerText = totalReceber.toLocaleString('pt-br', { 
                style: 'currency', 
                currency: 'BRL' 
            });
            
            const campoAlerta = document.getElementById('ia-alertas');
            const campoTexto = document.getElementById('ia-texto-analise');

            if (atrasados > 0) {
                campoAlerta.innerText = `${atrasados} BOLETOS VENCIDOS`;
                campoAlerta.style.color = "#ff4444";
                campoTexto.innerHTML = `<strong>INSIGHT IA:</strong> Identificamos ${atrasados} pendências atrasadas. Recomendamos priorizar a cobrança desses valores para não afetar o capital de giro da <strong>Euro Diesel</strong>.`;
            } else {
                campoAlerta.innerText = "TUDO EM DIA";
                campoAlerta.style.color = "#28a745";
                campoTexto.innerText = "Excelente! O fluxo de caixa está saudável e não há atrasos críticos detectados nos lançamentos atuais.";
            }

        } catch (error) {
            console.error(error);
            alert("Erro ao processar dados: " + error.message);
        } finally {
            btn.innerText = "PROCESSAR DADOS COM IA";
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
