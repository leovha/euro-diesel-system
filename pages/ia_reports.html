<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL | MASTER INTELLIGENCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: #111111;
            --border: #222222;
            --text-gray: #888888;
            --accent-red: #ff3d00;
        }

        body {
            background: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Restaurada e Funcional */
        .sidebar {
            width: 250px;
            background: #0a0a0a;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .logo-box {
            font-weight: 800;
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 40px;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-btn {
            background: transparent;
            color: #888;
            border: 1px solid #222;
            padding: 12px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #111; color: var(--gold); border-color: var(--gold); }
        .nav-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        .btn-sync {
            background: #1a1a1a;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .btn-sync:hover { background: var(--gold); color: black; }

        .btn-sair {
            background: #ff4444;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-bottom: 3px solid var(--gold);
        }

        .kpi-label { color: var(--text-gray); font-size: 11px; text-transform: uppercase; font-weight: 700; }
        .kpi-value { font-size: 24px; font-weight: 700; margin-top: 8px; }

        .insight-box {
            background: #0d0d0d;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box">EURO DIESEL</div>
        
        <nav>
            <button class="nav-btn" onclick="location.href='dashboard.html'">PAINEL DE VARREDURA</button>
            <button class="nav-btn" onclick="location.href='financeiro.html'">LANÇAR BOLETOS</button>
            <button class="nav-btn" onclick="location.href='vales.html'">VALES & COMISSÕES</button>
            <button class="nav-btn" onclick="location.href='usuarios.html'">GESTÃO DE USUÁRIOS</button>
            <button class="nav-btn active" onclick="location.href='ia_reports.html'">RELATÓRIOS IA</button>
        </nav>

        <button class="btn-sync" onclick="gerarRelatorioIA()">SINCRONIZAR MASTER</button>
        <button class="btn-sair" onclick="location.href='../index.html'">SAIR DO SISTEMA</button>
    </aside>

    <main class="main-content">
        <h1 style="margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px;">Master Intelligence</h1>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Entrada Prevista</div>
                <div id="ia-previsao" class="kpi-value">R$ 0,00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Pendências</div>
                <div id="ia-alertas" class="kpi-value" style="color: var(--accent-red);">R$ 0,00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Comissões (35%)</div>
                <div id="ia-comissoes" class="kpi-value">R$ 0,00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Vales</div>
                <div id="ia-vales-total" class="kpi-value">R$ 0,00</div>
            </div>
        </div>

        <div class="insight-box">
            <h3 style="color: var(--gold); margin-top: 0;">ANÁLISE ESTRATÉGICA IA</h3>
            <div id="ia-texto-analise" style="line-height: 1.6; color: #ccc;">
                Aguardando sincronização com o banco de dados...
            </div>
        </div>
    </main>

    <script>
        async function gerarRelatorioIA() {
            const btn = document.querySelector('.btn-sync');
            btn.innerText = "PROCESSANDO...";
            
            try {
                const [respFin, respVales] = await Promise.all([
                    supabaseCon.from('financeiro').select('*').or('status.eq.PENDENTE,status.eq.pendente'),
                    supabaseCon.from('vales').select('valor')
                ]);

                if (respFin.error || respVales.error) throw new Error("Erro de conexão.");

                let totalEntrada = 0, totalAtrasado = 0;
                const hoje = new Date();
                hoje.setHours(0,0,0,0);

                respFin.data.forEach(b => {
                    const v = parseFloat(b.valor) || 0;
                    totalEntrada += v;
                    const [ano, mes, dia] = b.vencimento.split('-');
                    if (new Date(ano, mes-1, dia) < hoje) totalAtrasado += v;
                });

                const totalVales = respVales.data.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
                const totalComissoes = totalEntrada * 0.35;
                const saldoLiquido = totalEntrada - totalComissoes - totalVales;

                const f = (v) => v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });

                document.getElementById('ia-previsao').innerText = f(totalEntrada);
                document.getElementById('ia-alertas').innerText = f(totalAtrasado);
                document.getElementById('ia-comissoes').innerText = f(totalComissoes);
                document.getElementById('ia-vales-total').innerText = f(totalVales);

                document.getElementById('ia-texto-analise').innerHTML = `
                    Sincronização realizada. <br>
                    <strong>SALDO LIVRE ESTIMADO: ${f(saldoLiquido)}</strong>.
                `;
            } catch (e) { alert(e.message); }
            finally { btn.innerText = "SINCRONIZAR MASTER"; }
        }
    </script>
</body>
</html>
